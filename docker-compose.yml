version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: my-org-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: my_org_cms
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d my_org_cms']
      interval: 5s
      timeout: 5s
      retries: 8
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
